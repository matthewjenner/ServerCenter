syntax = "proto3";

// The versioned wire contract. See Docs/phase-0-contracts.md section 1.
// Rules: never renumber or reuse a field tag; reserve removed tags. Major bump = breaking
// (reject on mismatch). Minor bump = additive only. Unknown fields tolerated (proto3).
package servercenter.v1;

option csharp_namespace = "ServerCenter.Contracts.V1";

// The single long-lived bidi RPC. The agent dials this on startup; it is the only
// agent-initiated connection. Controller pushes commands down, agent pushes status up.
service AgentLink {
  rpc Connect(stream AgentMessage) returns (stream ControllerMessage);
}

message Envelope {
  uint32 protocol_major = 1; // reject on mismatch
  uint32 protocol_minor = 2; // additive
  string message_id     = 3; // ulid, unique per message, for dedupe
  string correlation_id = 4; // ties a reply/progress to a request; empty if none
  int64  sent_unix_ms   = 5; // sender clock, advisory only
}

// -------- Agent -> Controller --------
message AgentMessage {
  Envelope envelope = 1;
  oneof payload {
    Hello           hello          = 10; // first message after connect
    Heartbeat       heartbeat      = 11;
    NodeStatus      status         = 12;
    JobProgress     job_progress   = 13;
    JobResyncReport job_resync     = 14; // reply to ResyncRequest
    CommandResult   command_result = 15;
  }
}

// -------- Controller -> Agent --------
message ControllerMessage {
  Envelope envelope = 1;
  oneof payload {
    HelloAck      hello_ack      = 10; // negotiated protocol + session
    ResyncRequest resync_request = 11;
    Command       command        = 12;
    CancelJob     cancel_job     = 13;
    Goodbye       goodbye        = 14; // typed close, e.g. VERSION_MISMATCH
  }
}

message Hello {
  string agent_id          = 1; // pinned controller-owned identity id
  string agent_version     = 2;
  string os_family         = 3; // linux | windows
  string arch              = 4;
  repeated string in_flight_job_ids = 5; // cheap first hint before full resync
  string node_kind         = 6; // guest | host (host = node zero, brief 3.4); default guest
}

message HelloAck {
  uint32 negotiated_minor = 1;
  string session_id       = 2;
  bool   wants_resync     = 3; // if true, agent expects a ResyncRequest
}

message Heartbeat {
  int64 agent_unix_ms = 1;
}

message NodeStatus {
  ServiceHealth agent_health = 1;
  ResourceSample resources   = 2;
  bool reboot_pending        = 3;
  repeated string services   = 4; // systemd unit names on the node (for the operator's service picker)
}

message ResourceSample {
  double cpu_pct          = 1;
  double mem_used_pct     = 2;
  double disk_used_pct    = 3;
  int64  uptime_secs      = 4;
  // Absolute values behind the percentages, for the operator UI (additive; 0 from an older agent).
  int64  mem_total_bytes  = 5;
  int64  mem_used_bytes   = 6;
  int64  disk_total_bytes = 7;
  int64  disk_used_bytes  = 8;
  int32  cpu_cores        = 9;
}

enum ServiceHealth {
  SERVICE_HEALTH_UNSPECIFIED = 0;
  SERVICE_HEALTH_ACTIVE      = 1;
  SERVICE_HEALTH_INACTIVE    = 2;
  SERVICE_HEALTH_FAILED      = 3;
  SERVICE_HEALTH_ACTIVATING  = 4;
  SERVICE_HEALTH_UNKNOWN     = 5;
}

// -------- Jobs (see phase-0-contracts.md section 2) --------
message Command {
  string job_id      = 1; // controller-assigned ulid; persisted at 'queued' first
  string type        = 2; // e.g. service.restart, update.apply, recipe.apply
  string params_json = 3; // typed per job type; validated controller-side on enqueue
  bool   cancellable = 4;
}

message CancelJob {
  string job_id = 1;
}

message JobProgress {
  string   job_id    = 1;
  int64    seq       = 2;    // monotonic per job; controller acks a watermark
  JobState state     = 3;
  int32    pct       = 4;    // 0..100; -1 for indeterminate
  string   note      = 5;
  LogLine  log       = 6;    // optional log line carried with the progress tick
}

message LogLine {
  LogStream stream = 1;
  string    line   = 2;
  int64     ts_unix_ms = 3;
}

enum LogStream {
  LOG_STREAM_UNSPECIFIED = 0;
  LOG_STREAM_STDOUT      = 1;
  LOG_STREAM_STDERR      = 2;
  LOG_STREAM_NOTE        = 3;
}

enum JobState {
  JOB_STATE_UNSPECIFIED = 0;
  JOB_STATE_QUEUED      = 1;
  JOB_STATE_RUNNING     = 2;
  JOB_STATE_SUCCEEDED   = 3;
  JOB_STATE_FAILED      = 4;
  JOB_STATE_TIMEDOUT    = 5;
  JOB_STATE_CANCELLED   = 6;
}

message CommandResult {
  string   job_id      = 1;
  JobState final_state = 2;
  string   fail_reason = 3; // empty unless failed/timedout
}

// -------- Resync handshake (built in Phase 1, before any real job) --------
message ResyncRequest {
  repeated string open_job_ids = 1; // ids the controller believes are non-terminal
}

message JobResyncReport {
  repeated JobResyncEntry entries = 1;
}

message JobResyncEntry {
  string           job_id        = 1;
  ResyncLocalState local_state   = 2;
  int64            last_seq      = 3; // highest progress seq the agent holds
  JobState         known_state   = 4; // agent's view if terminal
}

enum ResyncLocalState {
  RESYNC_LOCAL_STATE_UNSPECIFIED       = 0;
  RESYNC_LOCAL_STATE_STILL_RUNNING     = 1;
  RESYNC_LOCAL_STATE_FINISHED_SUCCEEDED = 2;
  RESYNC_LOCAL_STATE_FINISHED_FAILED   = 3;
  RESYNC_LOCAL_STATE_UNKNOWN           = 4; // agent lost its state (e.g. rebuilt)
}

message Goodbye {
  GoodbyeReason reason  = 1;
  string        message = 2;
}

enum GoodbyeReason {
  GOODBYE_REASON_UNSPECIFIED     = 0;
  GOODBYE_REASON_VERSION_MISMATCH = 1;
  GOODBYE_REASON_REVOKED         = 2;
  GOODBYE_REASON_SHUTTING_DOWN   = 3;
}

// -------- Operator-facing fleet view (the dashboard reads this) --------
// The UI talks only to the controller (brief). This is a separate operator API from the agent
// link; it does not require a client cert. Dual-truth (brief 3.7): agent-online and VM-running
// are independent, both surfaced, with Stale/Unknown first-class.
service FleetView {
  rpc GetFleet(GetFleetRequest) returns (FleetSnapshot);
  rpc WatchFleet(WatchFleetRequest) returns (stream FleetSnapshot); // server pushes on a cadence
}

message GetFleetRequest {}
message WatchFleetRequest {}

message FleetSnapshot {
  repeated NodeState nodes = 1;
  int64 generated_unix_ms  = 2;
  string controller_version = 3; // the controller's own product version (container/image)
}

message NodeState {
  string node_id                = 1;
  string display_name           = 2;
  string kind                   = 3; // guest | host
  AgentLiveness agent_liveness  = 4; // agent-online truth (derived from heartbeat gap)
  int64 last_heartbeat_unix_ms  = 5;
  VmState vm_state              = 6; // VM-running truth; Unknown until libvirt (Phase 6)
  ServiceHealth agent_health    = 7;
  ResourceSample resources      = 8;
  // Diagnostics reported by the agent (version/os/arch from the Hello, reboot from status). Additive;
  // empty from an older agent/controller during a mixed-version rollout.
  string agent_version          = 9;
  string os_family              = 10;
  string arch                   = 11;
  bool reboot_pending           = 12;
}

enum AgentLiveness {
  AGENT_LIVENESS_UNSPECIFIED = 0;
  AGENT_LIVENESS_ONLINE      = 1;
  AGENT_LIVENESS_STALE       = 2;
  AGENT_LIVENESS_OFFLINE     = 3;
}

enum VmState {
  VM_STATE_UNKNOWN = 0; // no libvirt truth yet
  VM_STATE_RUNNING = 1;
  VM_STATE_STOPPED = 2;
}

// -------- Operator-facing job view (the dashboard's jobs panel) --------
service JobView {
  rpc WatchJobs(WatchJobsRequest) returns (stream JobListSnapshot); // recent jobs, pushed on a cadence
  rpc RestartService(RestartServiceRequest) returns (RestartServiceResponse); // trigger a service.restart job
  rpc TriggerUpdate(TriggerUpdateRequest) returns (TriggerUpdateResponse); // dispatch update.apply from a stored policy
  rpc TriggerVmAction(TriggerVmActionRequest) returns (TriggerVmActionResponse); // controller-driven VM lifecycle
}

message WatchJobsRequest {}

message JobListSnapshot {
  repeated JobInfo jobs = 1;
  int64 generated_unix_ms = 2;
}

message JobInfo {
  string job_id            = 1;
  string node_id           = 2;
  string type              = 3;
  JobState state           = 4;
  int32 progress_pct       = 5; // -1 = indeterminate
  string progress_note     = 6;
  string fail_reason       = 7;
  int64 created_unix_ms    = 8;
  int64 terminal_unix_ms   = 9; // 0 if not terminal
}

message RestartServiceRequest {
  string agent_id = 1;
  string unit     = 2;
}

message RestartServiceResponse {
  string job_id = 1;
}

message TriggerUpdateRequest {
  string agent_id            = 1;
  string policy_id           = 2;
  int32  policy_version      = 3; // 0 = latest
  repeated string packages   = 4; // empty = everything the provider offers
  string service_unit        = 5; // optional; the unit to stop/start around the update
}

message TriggerUpdateResponse {
  string job_id  = 1; // empty unless dispatched
  string outcome = 2; // Dispatched | PolicyNotFound | NotEligible | NeedsConfirmation
  string reason  = 3; // human-readable detail when not dispatched
}

// VM lifecycle is controller-driven (controller -> local libvirt), so the target is a node, not an
// agent; the controller resolves the node's libvirt domain.
enum VmLifecycleAction {
  VM_LIFECYCLE_ACTION_UNSPECIFIED = 0;
  VM_LIFECYCLE_ACTION_START       = 1;
  VM_LIFECYCLE_ACTION_STOP        = 2;
  VM_LIFECYCLE_ACTION_RESTART     = 3;
}

message TriggerVmActionRequest {
  string node_id           = 1;
  VmLifecycleAction action  = 2;
}

message TriggerVmActionResponse {
  string job_id  = 1; // empty unless dispatched
  string outcome = 2; // Dispatched | NotFound | NoDomain
  string reason  = 3;
}
